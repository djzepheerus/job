<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лесная биржа</title>
<style>
body { font-family: sans-serif; background:#eee; padding:20px; }
.box { background:#fff; padding:20px; border-radius:10px; max-width:900px; margin:auto; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
td, th { border-bottom:1px solid #ddd; padding:8px; text-align:left; vertical-align:top; }
button { cursor:pointer; }
.top { display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px; }
.pending { color:orange; }
.accepted { color:green; }
.rejected { color:red; }

/* адаптив — таблица становится прокручиваемой на телефонах, но остаётся таблицей */
@media (max-width: 700px) {
    body { padding: 10px; }
    .box { padding: 15px; }
    .top { flex-direction: column; align-items: flex-start; }
    input, button { width: 100%; margin-top: 5px; box-sizing:border-box; }
    .table-wrapper { overflow-x: auto; display: block; width: 100%; }
    table { min-width: 500px; }
}
</style>
</head>
<body>

<p style="text-align:center; font-size:30px">Лесная биржа труда</p>

<div class="box">
    <div id="app"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAj31iKIuQK2q-grcT9rUhFG7nS2Cwq7Bw",
  authDomain: "job-e130b.firebaseapp.com",
  projectId: "job-e130b",
  storageBucket: "job-e130b.firebasestorage.app",
  messagingSenderId: "305895075912",
  appId: "1:305895075912:web:e3454cbd53416bedfa287d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let orders = [];
let responses = [];

onSnapshot(collection(db, "orders"), snapshot => {
    orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
});

onSnapshot(collection(db, "responses"), snapshot => {
    responses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
});

const USERS = {
    wolf: { login:"волк", pass:"серый", role:"wolf", name:"Волк" },
    beaver: { login:"бобр", pass:"корич", role:"beaver", name:"Бобр" }
};

let currentUser = null;

async function createOrder() {
    const titleInput = document.getElementById("t");
    const descInput = document.getElementById("d");
    const priceInput = document.getElementById("p");
    if (!titleInput || !priceInput) return;
    if (!titleInput.value || !priceInput.value) return;

    await addDoc(collection(db, "orders"), {
        title: titleInput.value,
        description: descInput?.value || "",
        price: +priceInput.value,
        status:"open"
    });

    titleInput.value = "";
    if (descInput) descInput.value = "";
    priceInput.value = "";
}

async function deleteOrder(id) {
    const relatedResponses = responses.filter(r => r.orderId === id);
    for (const resp of relatedResponses) {
        await deleteDoc(doc(db, "responses", resp.id));
    }
    await deleteDoc(doc(db, "orders", id));
}

async function addResponse(orderId) {
    if (responses.some(r => r.orderId === orderId && r.user === currentUser.name)) return;
    await addDoc(collection(db, "responses"), {
        orderId,
        user: currentUser.name,
        status:"pending"
    });
}

async function acceptResponse(respId) {
    const resp = responses.find(r => r.id === respId);
    if (!resp) return;

    for (const r of responses) {
        if (r.orderId === resp.orderId) {
            await updateDoc(doc(db, "responses", r.id), {
                status: r.id === respId ? "accepted" : "rejected"
            });
        }
    }

    await updateDoc(doc(db, "orders", resp.orderId), {
        status: "closed"
    });
}

function render() {
    const appDiv = document.getElementById("app");
    if (!currentUser) {
        appDiv.innerHTML = `
            <h3>Вход</h3>
            <input id="login" placeholder="логин">
            <input id="pass" type="password" placeholder="пароль">
            <button id="loginBtn">Войти</button>
            <p id="error" style="color:red"></p>
            <p style="color: gray">волк / серый или бобр / корич</p>
        `;
        return;
    }
    if (currentUser.role === "wolf") renderWolf(appDiv);
    else renderBeaver(appDiv);
}

function header() {
    return `
        <div class="top">
            <div>${currentUser.name} (${currentUser.role})</div>
            <button id="logout">Выйти</button>
        </div>
    `;
}

function renderWolf(app) {
    const rows = orders.map(o => {
        const resps = responses.filter(r => r.orderId === o.id);
        const respList = resps.map(r => `
            <div style="margin-bottom:6px;">
                ${r.user} — <span class="${r.status}">${r.status}</span>
                ${r.status === "pending" ? `<button data-accept="${r.id}" style="margin-left:6px;">Принять</button>` : ""}
            </div>
        `).join("");
        return `
        <tr>
            <td><strong>${escapeHtml(o.title)}</strong><br><small>${escapeHtml(o.description)}</small></td>
            <td>${o.price}</td>
            <td>${respList || "нет"}</td>
            <td><button data-del="${o.id}">X</button></td>
        </tr>
        `;
    }).join("");

    app.innerHTML = `
        ${header()}
        <h3>Создать заказ</h3>
        <input id="t" placeholder="название">
        <input id="d" placeholder="описание">
        <input id="p" type="number" placeholder="цена">
        <button id="create">Создать</button>

        <h3>Заказы</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Название</th><th>Цена</th><th>Отклики</th><th></th></tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    `;
}

function renderBeaver(app) {
    const availableOrders = orders.filter(o => o.status === "open");
    const rows = availableOrders.map(o => `
        <tr>
            <td><strong>${escapeHtml(o.title)}</strong><br><small>${escapeHtml(o.description)}</small></td>
            <td>${o.price}</td>
            <td><button data-resp="${o.id}">Отклик</button></td>
        </tr>
    `).join("");

    const myResponsesList = responses
        .filter(r => r.user === currentUser.name)
        .map(r => {
            const order = orders.find(o => o.id === r.orderId);
            if (!order) return null;
            return `
            <tr>
                <td><strong>${escapeHtml(order.title)}</strong></td>
                <td class="${r.status}">${r.status}</td>
            </tr>
            `;
        })
        .filter(item => item !== null)
        .join("");

    app.innerHTML = `
        ${header()}
        <h3>Доступные</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Название</th><th>Цена</th><th></th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="3">Нет доступных заказов</td></tr>'}</tbody>
            </table>
        </div>

        <h3>Мои отклики</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Заказ</th><th>Статус</th></tr>
                </thead>
                <tbody>${myResponsesList || '<tr><td colspan="2">Нет откликов</td></tr>'}</tbody>
            </table>
        </div>
    `;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

document.addEventListener("click", async (e) => {
    if (e.target.id === "loginBtn") {
        const loginInput = document.getElementById("login");
        const passInput = document.getElementById("pass");
        const errorSpan = document.getElementById("error");
        const l = loginInput?.value;
        const p = passInput?.value;
        let foundUser = null;
        for (const u of Object.values(USERS)) {
            if (u.login === l && u.pass === p) {
                foundUser = u;
                break;
            }
        }
        if (!foundUser) {
            if (errorSpan) errorSpan.textContent = "Неверный логин или пароль";
            return;
        }
        currentUser = foundUser;
        render();
    }
    if (e.target.id === "logout") {
        currentUser = null;
        render();
    }
    if (e.target.id === "create") {
        await createOrder();
    }
    if (e.target.dataset.del) {
        if (confirm("Удалить заказ? Все отклики на него тоже исчезнут.")) {
            await deleteOrder(e.target.dataset.del);
        }
    }
    if (e.target.dataset.resp) {
        await addResponse(e.target.dataset.resp);
    }
    if (e.target.dataset.accept) {
        if (confirm("Принять отклик? Другие будут отклонены, заказ закроется.")) {
            await acceptResponse(e.target.dataset.accept);
        }
    }
});

render();
</script>
</body>
</html>
