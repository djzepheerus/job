<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Лесная биржа</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #e5e7eb; margin: 0; padding: 12px; }
.box { background: white; padding: 16px; border-radius: 20px; max-width: 600px; margin: 0 auto; }
button { background: #2d6a4f; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; font-size: 16px; }
button.danger { background: #b91c1c; }
button.refresh { background: #2196f3; }
input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 30px; font-size: 16px; }
.card { background: #f9f9f9; border-radius: 16px; padding: 12px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
.status { font-size: 13px; padding: 8px; border-radius: 20px; text-align: center; margin-bottom: 12px; }
.pending { color: #e67e22; }
.accepted { color: #2e7d32; }
.rejected { color: #c62828; }
hr { margin: 20px 0; }
</style>
</head>
<body>
<div class="box">
    <h2 style="text-align:center">🌲 Лесная биржа</h2>
    <div id="status" class="status" style="background:#f0fdf4;">🔄 Проверка подключения...</div>
    <div id="app"></div>
</div>

<script>
// КОНФИГ FIREBASE (ваш)
const firebaseConfig = {
  apiKey: "AIzaSyAj31iKIuQK2q-grcT9rUhFG7nS2Cwq7Bw",
  authDomain: "job-e130b.firebaseapp.com",
  databaseURL: "https://job-e130b-default-rtdb.firebaseio.com",
  projectId: "job-e130b",
  storageBucket: "job-e130b.firebasestorage.app",
  messagingSenderId: "305895075912",
  appId: "1:305895075912:web:e3454cbd53416bedfa287d"
};

// Инициализация
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const dbRef = database.ref('/lesnayaBirzha');

// Данные
let orders = [];
let responses = [];
let currentUser = null;

const USERS = {
    wolf: { login: "волк", pass: "серый", role: "wolf", name: "Волк" },
    beaver: { login: "бобр", pass: "корич", role: "beaver", name: "Бобр" }
};

// Функция загрузки данных (ОДНОКРАТНАЯ, без бесконечного слушателя)
function loadDataFromFirebase(callback) {
    const statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "⏳ Загрузка данных из облака...";
    statusDiv.style.background = "#fff3e0";
    
    dbRef.once('value').then((snapshot) => {
        const data = snapshot.val();
        if (data && data.orders) {
            orders = data.orders;
            responses = data.responses || [];
            statusDiv.innerHTML = "✅ Данные загружены из облака";
            statusDiv.style.background = "#e8f5e9";
            setTimeout(() => {
                statusDiv.innerHTML = "📡 Онлайн режим (нажмите «Обновить» для синхронизации)";
                statusDiv.style.background = "#e3f2fd";
            }, 2000);
        } else {
            // Первый запуск - создаём демо
            orders = [
                { id: crypto.randomUUID(), title: "Плотина", description: "Сделать плотину", price: 100, status: "open" }
            ];
            responses = [];
            saveToFirebase();
            statusDiv.innerHTML = "✅ Демо-данные созданы";
        }
        if (callback) callback();
    }).catch((error) => {
        console.error("Ошибка:", error);
        statusDiv.innerHTML = "❌ Ошибка подключения к Firebase! Проверьте интернет и настройки";
        statusDiv.style.background = "#ffebee";
        statusDiv.style.color = "#c62828";
    });
}

// Сохранение в Firebase
function saveToFirebase() {
    const statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "💾 Сохранение в облако...";
    statusDiv.style.background = "#fff3e0";
    
    dbRef.set({
        orders: orders,
        responses: responses,
        lastUpdated: Date.now()
    }).then(() => {
        statusDiv.innerHTML = "✅ Сохранено! Нажмите «Обновить» на другом устройстве";
        statusDiv.style.background = "#e8f5e9";
        setTimeout(() => {
            statusDiv.innerHTML = "📡 Готово (нажмите «Обновить» для синхронизации)";
            statusDiv.style.background = "#e3f2fd";
        }, 2000);
    }).catch((error) => {
        statusDiv.innerHTML = "❌ Ошибка сохранения: " + error.message;
        statusDiv.style.background = "#ffebee";
    });
}

// Функция обновления (вручную)
function refreshData() {
    loadDataFromFirebase(() => {
        if (currentUser) render();
    });
}

// Бизнес-логика
function createOrder(title, description, price) {
    if (!title || !price) return false;
    orders.unshift({
        id: crypto.randomUUID(),
        title: title.trim(),
        description: description?.trim() || "",
        price: Number(price),
        status: "open"
    });
    saveToFirebase();
    return true;
}

function deleteOrder(id) {
    orders = orders.filter(o => o.id !== id);
    responses = responses.filter(r => r.orderId !== id);
    saveToFirebase();
}

function addResponse(orderId) {
    if (responses.some(r => r.orderId === orderId && r.user === currentUser.name)) {
        alert("Вы уже откликались");
        return false;
    }
    const order = orders.find(o => o.id === orderId);
    if (!order || order.status !== "open") {
        alert("Заказ закрыт");
        return false;
    }
    responses.push({
        id: crypto.randomUUID(),
        orderId,
        user: currentUser.name,
        status: "pending"
    });
    saveToFirebase();
    return true;
}

function acceptResponse(respId) {
    const resp = responses.find(r => r.id === respId);
    if (!resp) return;
    const order = orders.find(o => o.id === resp.orderId);
    if (!order || order.status !== "open") return;
    
    responses.forEach(r => {
        if (r.orderId === resp.orderId) {
            r.status = (r.id === respId) ? "accepted" : "rejected";
        }
    });
    order.status = "closed";
    saveToFirebase();
}

function render() {
    const app = document.getElementById("app");
    if (!currentUser) {
        app.innerHTML = `
            <input id="login" placeholder="Логин">
            <input id="pass" type="password" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <hr>
            <div style="background:#f0fdf4; padding:12px; border-radius:16px;">
                🐺 Волк: логин "волк" пароль "серый"<br>
                🦫 Бобр: логин "бобр" пароль "корич"
            </div>
            <button id="refreshBtn" class="refresh" style="margin-top:15px;">⟳ Обновить данные</button>
        `;
        return;
    }
    
    if (currentUser.role === "wolf") {
        const openOrders = orders.filter(o => o.status === "open");
        const closedOrders = orders.filter(o => o.status === "closed");
        
        app.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong>🐺 ${currentUser.name}</strong>
                <button id="logout" style="width:auto;">Выйти</button>
            </div>
            <button id="refreshBtn" class="refresh">⟳ Обновить данные</button>
            
            <div style="background:#e8f5e9; padding:12px; border-radius:16px; margin:15px 0;">
                <h3>📝 Новый заказ</h3>
                <input id="t" placeholder="Название">
                <textarea id="d" placeholder="Описание" rows="2"></textarea>
                <input id="p" type="number" placeholder="Цена">
                <button id="create">➕ Создать</button>
            </div>
            
            <h3>🔥 Активные</h3>
            ${openOrders.map(o => `
                <div class="card">
                    <strong>${escapeHtml(o.title)}</strong><br>
                    <small>${escapeHtml(o.description) || "—"}</small><br>
                    💰 ${o.price} монет<br>
                    <div style="margin-top:8px;">
                        <strong>Отклики:</strong>
                        ${responses.filter(r=>r.orderId===o.id).map(r=>`
                            <div style="background:#fff; padding:6px; margin:5px 0; border-radius:12px;">
                                ${escapeHtml(r.user)} — <span class="${r.status}">${r.status==="pending"?"⏳ ожидает":r.status==="accepted"?"✅ принят":"❌ отклонён"}</span>
                                ${r.status==="pending"?`<button data-accept="${r.id}" style="width:auto; padding:6px 12px; margin-top:5px;">✔ Принять</button>`:""}
                            </div>
                        `).join("") || "нет"}
                    </div>
                    <button class="danger" data-del="${o.id}" style="margin-top:10px;">🗑 Удалить</button>
                </div>
            `).join("") || "<div class='card'>Нет активных заказов</div>"}
            
            <h3>📦 Архив</h3>
            ${closedOrders.map(o => `
                <div class="card" style="opacity:0.7;">
                    <strong>${escapeHtml(o.title)}</strong> — 💰 ${o.price} 🔒 Закрыт
                    <button class="danger" data-del="${o.id}" style="margin-top:8px;">🗑</button>
                </div>
            `).join("") || "<div class='card'>Нет закрытых</div>"}
        `;
    } else {
        const available = orders.filter(o => o.status === "open");
        const myResponses = responses.filter(r => r.user === currentUser.name);
        
        app.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <strong>🦫 ${currentUser.name}</strong>
                <button id="logout" style="width:auto;">Выйти</button>
            </div>
            <button id="refreshBtn" class="refresh">⟳ Обновить данные</button>
            
            <h3>🌲 Доступные заказы</h3>
            ${available.map(o => `
                <div class="card">
                    <strong>${escapeHtml(o.title)}</strong><br>
                    <small>${escapeHtml(o.description) || "—"}</small><br>
                    💰 ${o.price} монет<br>
                    <button data-resp="${o.id}" style="margin-top:8px;">📨 Откликнуться</button>
                </div>
            `).join("") || "<div class='card'>Нет доступных заказов</div>"}
            
            <h3>📋 Мои отклики</h3>
            ${myResponses.map(r => {
                const order = orders.find(o=>o.id===r.orderId);
                return `<div class="card">
                    <strong>${order ? escapeHtml(order.title) : "❌ удалён"}</strong><br>
                    Статус: <span class="${r.status}">${r.status==="pending"?"⏳ На рассмотрении":r.status==="accepted"?"✅ Принят!":"❌ Отклонён"}</span>
                </div>`;
            }).join("") || "<div class='card'>Вы ещё не откликались</div>"}
        `;
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Обработчики событий
document.addEventListener("click", (e) => {
    if (e.target.id === "loginBtn") {
        const login = document.getElementById("login").value;
        const pass = document.getElementById("pass").value;
        let found = null;
        for (const u of Object.values(USERS)) {
            if (u.login === login && u.pass === pass) { found = u; break; }
        }
        if (!found) { alert("Неверный логин или пароль"); return; }
        currentUser = found;
        loadDataFromFirebase(() => render());
    }
    
    if (e.target.id === "logout") {
        currentUser = null;
        render();
    }
    
    if (e.target.id === "refreshBtn") {
        refreshData();
    }
    
    if (e.target.id === "create") {
        const title = document.getElementById("t").value;
        const desc = document.getElementById("d").value;
        const price = document.getElementById("p").value;
        if (createOrder(title, desc, price)) {
            document.getElementById("t").value = "";
            document.getElementById("d").value = "";
            document.getElementById("p").value = "";
            render();
        } else {
            alert("Заполните название и цену");
        }
    }
    
    if (e.target.dataset.del) {
        if (confirm("Удалить заказ?")) {
            deleteOrder(e.target.dataset.del);
            render();
        }
    }
    
    if (e.target.dataset.resp) {
        addResponse(e.target.dataset.resp);
        render();
    }
    
    if (e.target.dataset.accept) {
        if (confirm("Принять отклик?")) {
            acceptResponse(e.target.dataset.accept);
            render();
        }
    }
});

// Запуск
loadDataFromFirebase(() => render());
</script>
</body>
</html>
